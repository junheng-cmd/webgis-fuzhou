<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>福州专题地图 WebGIS</title>

<link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
<script src="https://js.arcgis.com/4.29/"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  display: flex;
  flex-direction: column;
  font-family: "Microsoft YaHei";
}

#header {
  height: 60px;
  background: linear-gradient(to right, #2980b9, #6dd5fa);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
}

#viewDiv {
  flex: 1;
}

#basemapDiv {
  height: 140px;
  background: #f5f7fa;
  border-top: 2px solid #ddd;
}

.esri-ui {
  background-color: rgba(255,255,255,0.85);
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="header">福州市 WebGIS 专题地图</div>
<div id="viewDiv"></div>
<div id="basemapDiv"></div>

<script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/widgets/ScaleBar",
  "esri/widgets/Legend",
  "esri/widgets/Search",
  "esri/widgets/LayerList",
  "esri/widgets/BasemapGallery"
], function(Map, MapView, FeatureLayer, ScaleBar, Legend, Search, LayerList, BasemapGallery) {

  const map = new Map({
    basemap: "streets-navigation-vector"
  });

  const earthquakeLayer = new FeatureLayer({
    url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/ArcGIS/rest/services/Earthquakes_Since1970/FeatureServer/0",
    title: "全球地震分布"
  });

  map.add(earthquakeLayer);

  const view = new MapView({
    container: "viewDiv",
    map: map,
    center: [119.3, 26.08],
    zoom: 10
  });

  const scaleBar = new ScaleBar({
    view: view,
    unit: "metric"
  });
  view.ui.add(scaleBar, "bottom-left");

  const legend = new Legend({
    view: view
  });
  view.ui.add(legend, "top-right");

  const search = new Search({
    view: view
  });
  view.ui.add(search, "top-left");

  const layerList = new LayerList({
    view: view
  });
  view.ui.add(layerList, "bottom-right");

  const basemapGallery = new BasemapGallery({
    view: view,
    container: "basemapDiv"
  });

});
</script>

</body>
</html>
